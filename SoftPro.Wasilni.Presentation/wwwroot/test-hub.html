<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wasilni — SignalR Hub Tester</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 24px; }

    h1 { text-align: center; font-size: 1.5rem; color: #38bdf8; margin-bottom: 24px; letter-spacing: 1px; }

    .grid { display: grid; grid-template-columns: 360px 1fr; gap: 20px; max-width: 1150px; margin: 0 auto; }

    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
    .card h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #334155; }

    .status-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; max-width: 1150px; margin-left: auto; margin-right: auto; padding: 10px 16px; background: #1e293b; border: 1px solid #334155; border-radius: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; transition: background .3s; flex-shrink: 0; }
    .dot.connected  { background: #22c55e; }
    .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #status-text { font-size: 0.85rem; color: #94a3b8; }
    #token-display { margin-left: auto; font-size: 0.7rem; color: #64748b; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px; margin-top: 10px; }
    label:first-of-type { margin-top: 0; }

    input, select { width: 100%; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: #e2e8f0; padding: 7px 10px; font-size: 0.85rem; outline: none; transition: border-color .2s; }
    input:focus, select:focus { border-color: #38bdf8; }
    select option { background: #1e293b; }

    button { margin-top: 10px; width: 100%; padding: 8px; border-radius: 8px; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
    button:active { transform: scale(.98); }
    button:disabled { opacity: .35; cursor: not-allowed; }

    .btn-primary { background: #38bdf8; color: #0f172a; }
    .btn-success { background: #22c55e; color: #0f172a; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-warning { background: #f59e0b; color: #0f172a; }
    .btn-neutral { background: #475569; color: #e2e8f0; }
    .btn-seed    { background: #7c3aed; color: #fff; }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn-row button { margin-top: 0; }

    hr { border: none; border-top: 1px solid #334155; margin: 14px 0; }

    /* seed table */
    .seed-table { width: 100%; border-collapse: collapse; font-size: 0.72rem; margin-top: 8px; }
    .seed-table th { color: #64748b; text-align: left; padding: 3px 6px; border-bottom: 1px solid #334155; }
    .seed-table td { padding: 4px 6px; border-bottom: 1px solid #1e293b; }
    .seed-table tr.clickable { cursor: pointer; }
    .seed-table tr.clickable:hover td { background: #0f172a; }
    .seed-table tr.selected td { background: #172554; color: #93c5fd; }
    .badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; }
    .badge-driver { background: #1d4ed8; color: #bfdbfe; }
    .badge-bus    { background: #065f46; color: #6ee7b7; }

    /* trip badge */
    #trip-info { display: none; background: #0f172a; border: 1px solid #22c55e; border-radius: 8px; padding: 8px 12px; margin-top: 10px; font-size: 0.75rem; color: #86efac; }
    #trip-info span { display: block; }

    /* log */
    .log-wrap { display: flex; flex-direction: column; height: 100%; }
    #log { flex: 1; min-height: 520px; overflow-y: auto; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px; font-family: 'Consolas', monospace; font-size: 0.75rem; line-height: 1.7; }
    .log-entry { padding: 2px 0; border-bottom: 1px solid #0f172a; }
    .log-time  { color: #475569; }
    .log-event { color: #38bdf8; font-weight: 700; }
    .log-data  { color: #a3e635; }
    .log-info  { color: #94a3b8; }
    .log-error { color: #f87171; font-weight: 600; }
    .log-sent  { color: #f59e0b; }
    .log-controls { display: flex; gap: 8px; margin-top: 8px; }
    .log-controls button { margin-top: 0; width: auto; flex: 1; padding: 5px 10px; font-size: 0.75rem; }
  </style>
</head>
<body>

<h1>🚌 Wasilni — SignalR Hub Tester</h1>

<!-- Status bar -->
<div class="status-bar">
  <div class="dot" id="dot"></div>
  <span id="status-text">Disconnected</span>
  <span id="token-display">No token</span>
</div>

<div class="grid">

  <!-- ─── LEFT PANEL ─────────────────────────────────────────────────────── -->
  <div style="display:flex;flex-direction:column;gap:14px;">

    <!-- Seed -->
    <div class="card">
      <h2>① Seed Data</h2>
      <button class="btn-seed" onclick="loadSeed()">🌱 Load Seed (GET /seed)</button>

      <div id="seed-drivers-wrap" style="display:none; margin-top:10px;">
        <label>Drivers — click to auto-fill login</label>
        <table class="seed-table" id="seed-drivers">
          <thead><tr><th>Name</th><th>Phone</th><th>Bus</th><th>Plate</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Login -->
    <div class="card">
      <h2>② Login</h2>
      <label>Phone</label>
      <input type="text"     id="phone"    placeholder="09XXXXXXXX" />
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"  />
      <button class="btn-primary"  onclick="login()"       >Login &amp; Connect</button>
      <button class="btn-neutral"  onclick="disconnect()" disabled id="btn-disconnect">Disconnect</button>
    </div>

    <!-- Driver Actions -->
    <div class="card">
      <h2>③ Driver Actions</h2>

      <label>Bus ID</label>
      <input type="number" id="busId" value="" min="1" placeholder="auto-filled from seed" />
      <button class="btn-success" onclick="startTrip()" id="btn-start" disabled>▶ Start Trip</button>

      <div id="trip-info">
        <span id="ti-id"></span>
        <span id="ti-bus"></span>
        <span id="ti-line"></span>
      </div>

      <hr/>

      <label>Trip ID</label>
      <input type="number" id="tripId" value="" min="1" placeholder="auto-filled after StartTrip" />

      <label>Latitude</label>
      <input type="number" id="lat" value="33.5138" step="0.0001" />
      <label>Longitude</label>
      <input type="number" id="lng" value="36.2765" step="0.0001" />
      <button class="btn-primary" onclick="updateLocation()" id="btn-loc" disabled>📍 Update Location</button>

      <hr/>

      <div class="btn-row">
        <button class="btn-success" onclick="adjustAnon(+1)" id="btn-anon-plus"  disabled>+1 Boarded</button>
        <button class="btn-warning" onclick="adjustAnon(-1)" id="btn-anon-minus" disabled>-1 Exited</button>
      </div>

      <hr/>

      <button class="btn-danger" onclick="endTrip()" id="btn-end" disabled>⏹ End Trip</button>
    </div>

    <!-- Demo -->
    <div class="card">
      <h2>④ Auto Demo</h2>
      <label>Demo Driver Index (0–4)</label>
      <input type="number" id="demo-driver-idx" value="0" min="0" max="4" />
      <label>Location Updates</label>
      <input type="number" id="demo-loc-count"  value="5" min="1" max="20" />
      <label>Delay between steps (ms)</label>
      <input type="number" id="demo-delay"      value="1200" min="300" step="100" />
      <button class="btn-seed" onclick="runDemo()" id="btn-demo">🚀 Run Full Demo</button>
      <button class="btn-danger" onclick="stopDemo()" id="btn-stop-demo" disabled style="margin-top:6px;">⏹ Stop</button>

      <div id="demo-progress" style="display:none; margin-top:10px;">
        <div style="height:6px; background:#1e293b; border-radius:3px; overflow:hidden;">
          <div id="demo-bar" style="height:100%; width:0%; background:#7c3aed; transition:width .3s;"></div>
        </div>
        <div id="demo-step-label" style="font-size:0.72rem; color:#94a3b8; margin-top:4px;"></div>
      </div>
    </div>

  </div>

  <!-- ─── RIGHT PANEL ────────────────────────────────────────────────────── -->
  <div class="card log-wrap">
    <h2>📡 Event Log</h2>
    <div id="log"></div>
    <div class="log-controls">
      <button class="btn-neutral" onclick="clearLog()">🗑 Clear</button>
      <button class="btn-neutral" onclick="copyLog()">📋 Copy</button>
    </div>
  </div>

</div>

<script>
  let connection   = null;
  let token        = null;
  let activeTripId = null;
  let seedData     = null;

  const API = window.location.origin;

  // ─── Seed ──────────────────────────────────────────────────────────────────
  async function loadSeed() {
    logEntry('info', 'Seed', 'Calling GET /api/v1.0/seed …');
    try {
      const res  = await fetch(`${API}/api/v1.0/seed`);
      const data = await res.json();
      seedData   = data;

      logEntry('info', 'Seed', `✅ Created: ${data.summary.drivers} drivers, ${data.summary.passengers} passengers, ${data.summary.buses} buses`);

      // Render drivers table
      const tbody = document.querySelector('#seed-drivers tbody');
      tbody.innerHTML = '';
      data.drivers.forEach(d => {
        const tr = document.createElement('tr');
        tr.className = 'clickable';
        tr.innerHTML = `
          <td>${d.name}</td>
          <td>${d.phone}</td>
          <td><span class="badge badge-bus">#${d.busId}</span></td>
          <td>${d.busPlate}</td>`;
        tr.onclick = () => {
          document.querySelectorAll('#seed-drivers tr').forEach(r => r.classList.remove('selected'));
          tr.classList.add('selected');
          document.getElementById('phone').value  = d.phone;
          document.getElementById('password').value = 'Password@123';
          document.getElementById('busId').value  = d.busId;
          logEntry('info', 'AutoFill', `Filled: ${d.name} | Bus #${d.busId} (${d.busPlate})`);
        };
        tbody.appendChild(tr);
      });
      document.getElementById('seed-drivers-wrap').style.display = 'block';

    } catch (e) {
      logEntry('error', 'Seed', e.message);
    }
  }

  // ─── Login & Connect ────────────────────────────────────────────────────────
  async function login() {
    const phone    = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    if (!phone || !password) { logEntry('error', 'System', 'Phone and password required.'); return; }

    logEntry('info', 'Login', `Logging in as ${phone} …`);
    try {
      const res = await fetch(`${API}/api/v1.0/accounts/login`, {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ phoneNumber: phone, password })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        logEntry('error', 'Login', `HTTP ${res.status} — ${err.title ?? JSON.stringify(err)}`);
        return;
      }
      const data = await res.json();
      token = data.token ?? data.accessToken ?? data.Token ?? data.AccessToken;
      if (!token) { logEntry('error', 'Login', 'Token not found: ' + JSON.stringify(data)); return; }

      document.getElementById('token-display').textContent = 'Token: ' + token.substring(0,44) + '…';
      logEntry('info', 'Login', '✅ Authenticated');
      await connectHub();

    } catch (e) { logEntry('error', 'Login', e.message); }
  }

  // ─── SignalR ────────────────────────────────────────────────────────────────
  async function connectHub() {
    setStatus('connecting');
    connection = new signalR.HubConnectionBuilder()
      .withUrl(`${API}/hubs/tracking`, { accessTokenFactory: () => token })
      .withAutomaticReconnect([0, 2000, 5000, 10000])
      .configureLogging(signalR.LogLevel.Warning)
      .build();

    connection.on('OnTripStarted',           p => logEntry('event', 'OnTripStarted',           p));
    connection.on('OnTripEnded',             p => { logEntry('event', 'OnTripEnded', p); if (p?.tripId == activeTripId) clearActiveTrip(); });
    connection.on('OnLocationUpdated',       p => logEntry('event', 'OnLocationUpdated',       p));
    connection.on('OnAnonymousCountUpdated', p => logEntry('event', 'OnAnonymousCountUpdated', p));

    connection.onreconnecting(() => { setStatus('connecting'); logEntry('info', 'Hub', 'Reconnecting…'); });
    connection.onreconnected(() =>  { setStatus('connected');  logEntry('info', 'Hub', '✅ Reconnected'); });
    connection.onclose(e => {
      setStatus('disconnected');
      logEntry('error', 'Hub', 'Closed' + (e ? ': ' + e.message : ''));
    });

    try {
      await connection.start();
      setStatus('connected');
      logEntry('info', 'Hub', `✅ Connected  (id: ${connection.connectionId})`);
      setDriverButtons(true);
    } catch (e) {
      setStatus('disconnected');
      logEntry('error', 'Hub', 'Connect failed: ' + e.message);
    }
  }

  async function disconnect() {
    if (connection) { await connection.stop(); connection = null; token = null; }
    setStatus('disconnected');
    setDriverButtons(false);
    document.getElementById('token-display').textContent = 'No token';
    document.getElementById('btn-disconnect').disabled = true;
    clearActiveTrip();
  }

  // ─── Hub Invocations ────────────────────────────────────────────────────────
  async function startTrip() {
    const busId = parseInt(document.getElementById('busId').value);
    if (!busId) { logEntry('error', 'Client', 'Enter a Bus ID'); return; }
    logEntry('sent', 'StartTrip →', { busId });
    try {
      await connection.invoke('StartTrip', busId);
    } catch (e) { logEntry('error', 'StartTrip ✗', parseHubError(e)); }
  }

  async function endTrip() {
    const tripId = getTripId(); if (!tripId) return;
    logEntry('sent', 'EndTrip →', { tripId });
    try {
      await connection.invoke('EndTrip', tripId);
      clearActiveTrip();
    } catch (e) { logEntry('error', 'EndTrip ✗', parseHubError(e)); }
  }

  async function updateLocation() {
    const tripId = getTripId(); if (!tripId) return;
    const lat = parseFloat(document.getElementById('lat').value);
    const lng = parseFloat(document.getElementById('lng').value);
    logEntry('sent', 'UpdateLocation →', { tripId, lat, lng });
    try {
      await connection.invoke('UpdateLocation', tripId, lat, lng);
    } catch (e) { logEntry('error', 'UpdateLocation ✗', parseHubError(e)); }
  }

  async function adjustAnon(delta) {
    const tripId = getTripId(); if (!tripId) return;
    logEntry('sent', 'AdjustAnonymous →', { tripId, delta });
    try {
      await connection.invoke('AdjustAnonymousPassenger', tripId, delta);
    } catch (e) { logEntry('error', 'AdjustAnon ✗', parseHubError(e)); }
  }

  // ─── Hub Error Parser ────────────────────────────────────────────────────────
  function parseHubError(e) {
    try {
      const obj = JSON.parse(e.message);
      return `[${obj.type}] ${obj.detail}`;
    } catch {
      return e.message;
    }
  }

  // ─── Helpers ─────────────────────────────────────────────────────────────────
  function getTripId() {
    const v = parseInt(document.getElementById('tripId').value);
    if (!v) { logEntry('error', 'Client', 'Trip ID missing (auto-filled after StartTrip)'); return null; }
    return v;
  }

  function setActiveTrip(trip) {
    activeTripId = trip.id;
    document.getElementById('tripId').value = trip.id;
    const info = document.getElementById('trip-info');
    info.style.display = 'block';
    document.getElementById('ti-id').textContent   = `Trip ID : ${trip.id}`;
    document.getElementById('ti-bus').textContent  = `Bus     : ${trip.busPlate}`;
    document.getElementById('ti-line').textContent = `Line    : ${trip.lineName}`;
  }

  function clearActiveTrip() {
    activeTripId = null;
    document.getElementById('trip-info').style.display = 'none';
  }

  function setStatus(s) {
    document.getElementById('dot').className = 'dot ' + s;
    document.getElementById('status-text').textContent = s.charAt(0).toUpperCase() + s.slice(1);
  }

  function setDriverButtons(on) {
    ['btn-start','btn-loc','btn-anon-plus','btn-anon-minus','btn-end']
      .forEach(id => document.getElementById(id).disabled = !on);
    document.getElementById('btn-disconnect').disabled = !on;
  }

  // ─── Log ─────────────────────────────────────────────────────────────────────
  function logEntry(type, name, data) {
    // auto-fill trip from OnTripStarted
    if (type === 'event' && name === 'OnTripStarted' && data) setActiveTrip(data);

    const time   = new Date().toLocaleTimeString('en', { hour12: false });
    const pretty = typeof data === 'object' ? JSON.stringify(data, null, 2) : String(data ?? '');
    const div    = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML =
      `<span class="log-time">[${time}]</span> ` +
      `<span class="log-${type}">${escHtml(name)}</span> ` +
      `<span class="log-data">${escHtml(pretty)}</span>`;
    const log = document.getElementById('log');
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function clearLog() { document.getElementById('log').innerHTML = ''; }
  function copyLog()  {
    navigator.clipboard.writeText(document.getElementById('log').innerText)
      .then(() => logEntry('info','System','Log copied'));
  }

  // ─── Demo ─────────────────────────────────────────────────────────────────
  let demoAborted = false;

  // Damascus route — small incremental steps going east
  const ROUTE_START = { lat: 33.5138, lng: 36.2765 };

  async function runDemo() {
    demoAborted = false;
    document.getElementById('btn-demo').disabled      = true;
    document.getElementById('btn-stop-demo').disabled = false;
    document.getElementById('demo-progress').style.display = 'block';

    const driverIdx = parseInt(document.getElementById('demo-driver-idx').value ?? 0);
    const locCount  = parseInt(document.getElementById('demo-loc-count').value  ?? 5);
    const delay     = parseInt(document.getElementById('demo-delay').value       ?? 1200);

    const totalSteps = 5 + locCount;   // seed + login + start + locations + anon + end
    let   step       = 0;

    const progress = (label) => {
      step++;
      const pct = Math.round((step / totalSteps) * 100);
      document.getElementById('demo-bar').style.width        = pct + '%';
      document.getElementById('demo-step-label').textContent = label;
      logEntry('info', `[${step}/${totalSteps}]`, label);
    };

    const wait = (ms) => new Promise(r => setTimeout(r, ms));
    const abort = () => demoAborted;

    try {
      // ── Step 1: Seed ────────────────────────────────────────────────────
      progress('Seeding database …');
      await loadSeed();
      if (abort()) return demoFinish();
      await wait(delay);

      if (!seedData?.drivers?.length) {
        logEntry('error', 'Demo', 'No seed data — seed failed'); return demoFinish();
      }

      const idx    = Math.min(driverIdx, seedData.drivers.length - 1);
      const driver = seedData.drivers[idx];
      const busId  = driver.busId;

      // ── Step 2: Login ────────────────────────────────────────────────────
      progress(`Logging in as driver: ${driver.name} (${driver.phone})`);
      document.getElementById('phone').value    = driver.phone;
      document.getElementById('password').value = 'Password@123';
      document.getElementById('busId').value    = busId;
      await login();
      if (abort()) return demoFinish();
      await wait(delay);

      // ── Step 3: Start trip ───────────────────────────────────────────────
      progress(`StartTrip → busId: ${busId}`);
      await startTrip();
      if (abort()) return demoFinish();
      await wait(delay);

      // trip id auto-filled from OnTripStarted
      const tripId = parseInt(document.getElementById('tripId').value);
      if (!tripId) { logEntry('error','Demo','Trip ID not set — StartTrip may have failed'); return demoFinish(); }

      // ── Steps 4…N: Location updates ──────────────────────────────────────
      for (let i = 0; i < locCount; i++) {
        if (abort()) return demoFinish();
        const lat = +(ROUTE_START.lat + i * 0.0015).toFixed(6);
        const lng = +(ROUTE_START.lng + i * 0.0020).toFixed(6);
        document.getElementById('lat').value = lat;
        document.getElementById('lng').value = lng;
        progress(`UpdateLocation #${i+1} → (${lat}, ${lng})`);
        await updateLocation();
        await wait(delay);
      }

      // ── Anon passengers ──────────────────────────────────────────────────
      if (abort()) return demoFinish();
      progress('AdjustAnonymous → +1 (passenger boarded)');
      await adjustAnon(+1);
      await wait(delay);

      if (abort()) return demoFinish();
      progress('AdjustAnonymous → +1 (passenger boarded)');
      await adjustAnon(+1);
      await wait(delay);

      if (abort()) return demoFinish();
      progress('AdjustAnonymous → -1 (passenger exited)');
      await adjustAnon(-1);
      await wait(delay);

      // ── End trip ─────────────────────────────────────────────────────────
      if (abort()) return demoFinish();
      progress(`EndTrip → tripId: ${tripId}`);
      await endTrip();
      await wait(delay / 2);

      logEntry('info', 'Demo', '✅ Demo completed successfully!');

    } catch (e) {
      logEntry('error', 'Demo', 'Unexpected error: ' + e.message);
    } finally {
      demoFinish();
    }
  }

  function stopDemo() {
    demoAborted = true;
    logEntry('info', 'Demo', '⏹ Demo stopped by user');
    demoFinish();
  }

  function demoFinish() {
    document.getElementById('btn-demo').disabled      = false;
    document.getElementById('btn-stop-demo').disabled = true;
    document.getElementById('demo-bar').style.width   = '0%';
    document.getElementById('demo-step-label').textContent = '';
  }
</script>
</body>
</html>
